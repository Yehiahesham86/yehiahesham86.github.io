<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Knowledge Book</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-94LX4JF4L3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-94LX4JF4L3');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Ambient Background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="noise"></div>
  </div>

  <!-- Mouse Spotlight -->
  <div id="spotlight" aria-hidden="true"></div>

  <!-- Reading Progress -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- ── Header ── -->
  <header class="header" id="header">
    <div class="header-inner">

      <button class="menu-btn" id="menuBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

      <div class="brand">
        <img src="unnamed.png" class="logo-51talk" alt="51Talk">
        <span class="brand-sep">·</span>
        <span class="brand-name">Referral <strong>KB</strong></span>
      </div>

      <div class="search-wrap">
        <div class="search-box" id="searchBox">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search… (Ctrl K)" autocomplete="off">
          <button id="searchClear" class="s-clear" aria-label="Clear">✕</button>
          <kbd>⌘K</kbd>
        </div>
      </div>

      <div class="header-right">
        <div class="lang-wrap" id="langWrap">
          <button class="lang-current" id="langBtn" aria-haspopup="listbox" aria-expanded="false">
            <img class="lang-flag" id="langFlag" src="https://flagcdn.com/24x18/gb.png" alt="EN" width="24" height="18">
            <span class="lang-code" id="langCode">EN</span>
            <svg class="lang-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <ul class="lang-drop" id="langDrop" role="listbox">
            <li class="lang-opt active" data-lang="en" role="option"><img src="https://flagcdn.com/24x18/gb.png" alt="EN" width="24" height="18"><span>English</span></li>
            <li class="lang-opt" data-lang="zh" role="option"><img src="https://flagcdn.com/24x18/cn.png" alt="ZH" width="24" height="18"><span>中文</span></li>
            <li class="lang-opt" data-lang="ar" role="option"><img src="https://flagcdn.com/24x18/sa.png" alt="AR" width="24" height="18"><span>العربية</span></li>
          </ul>
        </div>
        <button class="icon-btn" id="themeBtn" title="Toggle theme">
          <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

    </div>
  </header>

  <!-- Search Dropdown -->
  <div id="searchDrop" class="search-drop">
    <div id="searchList" class="search-list"></div>
  </div>

  <!-- Mobile Overlay -->
  <div id="overlay" class="overlay"></div>

  <!-- ── Stage Tabs ── -->
  <div class="stage-tabs" id="stageTabs">
    <div class="stage-tabs-inner" id="stageTabsInner"></div>
  </div>

  <!-- ── Topnav ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-inner">
      <a class="sb-home active" data-section="home" href="#home">
        <span class="sb-home-icon">🏠</span>
        <span>Home</span>
      </a>
      <div class="sb-divider"></div>
      <div id="sbNav"></div>
    </div>
  </nav>

  <!-- ── Layout ── -->
  <div class="layout">

    <!-- Main -->
    <main class="main" id="main">

      <!-- Home -->
      <section id="home" class="home page-view active">

        <div class="hero">
          <div class="hero-51talk">
            <img src="unnamed.png" class="logo-51talk-hero" alt="51Talk">
            <div class="hero-51talk-text">
              <span class="h51-title">51Talk</span>
              <span class="h51-label">Internal Knowledge Base</span>
            </div>
          </div>
          <div class="hero-tag">
            <span class="tag-dot"></span> Knowledge Base
          </div>
          <h1 class="hero-title" id="heroTitle">
            Referral<br><span class="grad-text">Knowledge Book</span>
          </h1>
          <p class="hero-sub" id="heroSub"></p>
          <div class="hero-stats" id="heroStats"></div>
          <div class="hero-glow" aria-hidden="true"></div>
        </div>

        <p class="grid-label">All Sections — Quick Access</p>
        <div class="cat-grid" id="catGrid"></div>

      </section>

      <!-- Sections (generated) -->
      <div id="sections"></div>

    </main>
  </div>

  <!-- Back to Top -->
  <button id="btt" class="btt" aria-label="Back to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
